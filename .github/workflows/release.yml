name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      signed:
        description: 'Signed + notarized (requires Apple secrets in repo settings)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release-signed:
    if: github.event_name == 'push' || inputs.signed
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build signed and notarized DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          chmod +x scripts/build-release-dmg.sh
          ./scripts/build-release-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkCalm-dmg
          path: build/MarkCalm.dmg
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/MarkCalm.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-unsigned:
    if: github.event_name == 'workflow_dispatch' && !inputs.signed
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build unsigned DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkCalm-dmg-unsigned
          path: build/MarkCalm.dmg
          if-no-files-found: error
